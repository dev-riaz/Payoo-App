<!DOCTYPE html>
<html data-theme="light" lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payoo Home</title>
    <link rel="shortcut icon" href="./assets/logo.png" type="image/x-icon">

    <!-- tailwind+daisy -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- google font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap" rel="stylesheet">

    <!-- font awesome cdn -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <!-- style related -->
    <style>
        * {
            font-family: "Outfit", sans-serif;
        }
    </style>

</head>

<body class="min-h-screen max-w-md mx-auto shadow">
    <header class="border-b-2 border-gray-400/40 sticky top-0 bg-base-200">
        <section class="w-11/12 mx-auto py-5">
            <div class="flex justify-between items-center">
                <div class="flex gap-3 justify-center items-center">
                    <img class="w-16" src="./assets/logo.png" alt="">
                    <div class="">
                        <h1 class="text-[#080808] text-[18px] font-extrabold">$<span id="balance">45000</span></h1>
                        <p class="text-[#08080865]">Available Balance</p>
                    </div>
                </div>
                <a href="./index.html" class="btn btn-soft btn-primary"><i
                        class="fa-solid fa-arrow-right-from-bracket"></i>Log Out</a>
            </div>
        </section>
    </header>
    <main>
        <section class="">
            <div class="w-11/12 mx-auto py-10 space-y-8">
                <div class="space-y-3">
                    <h1 class="text-2xl text-[#080808] font-bold">Welcome to Pay<span class="text-[#7460FF]">oo</span>
                    </h1>
                    <p class="text-[#0808086b] ">Enjoy easy and convenient financial services with us. Cashout charge is
                        low
                        and </p>
                </div>
                <div class=" grid grid-cols-3 gap-2">
                    <button class="btn btn-soft btn-primary flex-col h-full py-3 rounded-2xl">
                        <img src="./assets/opt-1.png" alt="">
                        <p>Add Money</p>
                    </button>
                    <button class="btn btn-soft btn-primary flex-col h-full py-3 rounded-2xl">
                        <img src="./assets/opt-2.png" alt="">
                        <p>Cashout</p>
                    </button>
                    <button class="btn btn-soft btn-primary flex-col h-full py-3 rounded-2xl">
                        <img src="./assets/opt-3.png" alt="">
                        <p>Transfer Money</p>
                    </button>
                    <button class="btn btn-soft btn-primary flex-col h-full py-4 rounded-2xl">
                        <img src="./assets/opt-4.png" alt="">
                        <p>Get Bonus</p>
                    </button>
                    <button class="btn btn-soft btn-primary flex-col h-full py-5 rounded-2xl">
                        <img src="./assets/opt-5.png" alt="">
                        <p>Pay Bill</p>
                    </button>
                    <button class="btn btn-soft btn-primary flex-col h-full py-5 rounded-2xl">
                        <img src="./assets/opt-6.png" alt="">
                        <p>Transactions</p>
                    </button>
                </div>
            </div>
        </section>
        <section class="bg-gray-400/10">
            <div class="w-11/12 mx-auto py-8">
                <h1 class="text-[#080808] font-bold text-2xl">Cash Out</h1>
                <fieldset class="fieldset bg-white rounded-box shadow rounded-2xl p-6 mt-6 space-y-3">
                    <legend class="fieldset-legend"></legend>

                    <label class="label text-[#0808089d] text-[16px] font-medium">Agent Number</label>
                    <input id="cashout-number" maxlength="11" minlength="11" type="text" value=""
                        class="input text-[#0808086c] font-medium bg-[#F4F5F7] border-none rounded-full w-full"
                        placeholder="Enter 11 digit number" />

                    <label class="label text-[#0808086c] text-[16px] font-medium">Amount</label>
                    <input id="cashout-amount" maxlength="11" minlength="11" type="number"
                        class="input text-[#0808086c] font-medium bg-[#F4F5F7] border-none rounded-full w-full"
                        placeholder="Enter amount to withdraw" />

                    <label class="label text-[#0808086c] text-[16px] font-medium">Pin Number</label>
                    <input id="cashout-pin-number" maxlength="4" minlength="4" type="password"
                        class="input text-[#0808086c] font-medium bg-[#F4F5F7] border-none rounded-full w-full"
                        placeholder="Enter 4 digit pin number" />

                    <button id="btn-cashout" class="btn btn-primary mt-4 rounded-3xl">Withdraw Money</button>
                </fieldset>
            </div>
        </section>
    </main>
    <script src="./script/machine.js"></script>
    <script src="./script/chashout.js"></script>
</body>

</html>
